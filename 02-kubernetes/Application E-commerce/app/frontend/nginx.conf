# Bloc server : Configuration du serveur web
server {
    listen 8080;
    
    server_name localhost;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # ========================================
    # BLOC 1 : Reverse proxy vers le backend
    # ========================================
    location /api/ {
   
        proxy_pass http://backend-service:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # ========================================
    # BLOC 2 : Servir les fichiers statiques
    # ========================================
    location / {
  
        root /usr/share/nginx/html;
        
        index index.html;
        
        # SPA (Single Page Application) :
        # Si le fichier n'existe pas, renvoyer index.html
        # (permet de gérer les routes côté client)
        try_files $uri $uri/ /index.html;
    }
    
    # ========================================
    # BLOC 3 : Page d'erreur personnalisée (optionnel)
    # ========================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}