############################
### Speciale t3.micro
############################ 

- name: Créer un fichier swap de 1GB
  ansible.builtin.command: dd if=/dev/zero of=/swapfile bs=1M count=1024
  args:
    creates: /swapfile

- name: Permissions swap
  ansible.builtin.file:
    path: /swapfile
    mode: '0600'

- name: Formater le swap
  ansible.builtin.command: mkswap /swapfile

- name: Activer le swap
  ansible.builtin.command: swapon /swapfile
  ignore_errors: true

############################
### Update && Upgrade
############################ 

- name: Update && Upgrade package
  ansible.builtin.apt:
    update_cache: true
    upgrade: safe

############################
### Fail2ban
############################ 

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present


############################
### Auditd
############################ 

- name: Install auditd 
  ansible.builtin.apt:
    name:
      - auditd
      - audispd-plugins
    state: present
